- type: entity
  name: bola
  parent: [BaseItem, BaseSecurityContraband]
  id: Bola
  description: Linked together with some spare cuffs and metal.
  components:
  - type: Item
    size: Normal
  - type: Sprite
    sprite: _Harmony/Objects/Weapons/Throwable/bola.rsi #Harmony Change: Sprite pathway changed.
    state: icon
  - type: EmitSoundOnThrow
    sound: /Audio/Weapons/bolathrow.ogg
  - type: EmitSoundOnLand
    sound: /Audio/Effects/snap.ogg
  - type: Construction
    graph: Bola
    node: bola
  - type: Damageable
  - type: Injurable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 75
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 15
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: DamageOnLand
    damage:
      types:
        Blunt: 5
  - type: Ensnaring
    freeTime: 2.0
# Start Harmony change
    breakoutTime: 2.5 # 3.5 -> 2.5
    walkSpeed: 0.75 # 0.5 -> 0.75
    sprintSpeed: 0.75 # 0.5 -> 0.75
# End Harmony change
    staminaDamage: 0 # anything but this is gamebreaking
    canThrowTrigger: true
    canMoveBreakout: true
    maxEnsnares: 1
  - type: LandAtCursor
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PhysShapeCircle
          radius: 0.4
        density: 20 # derived from base_item
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
  - type: ExplosionResistance #Harmony Change -- Makes Bolas immune to explosives
    damageCoefficient: 0.0
