- type: entity
  name: pen
  parent: BaseItem
  id: Pen
  description: A dark ink pen.
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Misc/Pens/black.rsi # imp edit
    state: icon # imp edit, pen -> icon
  - type: Item
    sprite: _Impstation/Objects/Misc/Pens/black.rsi # imp edit
    #heldPrefix: pen # imp edit
    size: Tiny
  - type: Tag
    tags:
    - Write
    - Pen
  - type: PhysicalComposition
    materialComposition:
      Steel: 25
  - type: EmitSoundOnUse
    sound:
      path: /Audio/Items/pen_click.ogg
      params:
        volume: -4
        maxDistance: 2
  - type: UseDelay
    delay: 1.5
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PolygonShape
          vertices:
          - -0.3,0.1
          - -0.1,0.3
          - 0.3,-0.1
          - 0.1,-0.3
        density: 20 # derived from base_item
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
  - type: SignatureWriter #imp edit

- type: entity
  parent: Pen
  id: PenEmbeddable
  abstract: true
  components:
  - type: EmbeddableProjectile
    offset: 0.3,0.0
    removalTime: 0.0
  - type: ThrowingAngle
    angle: 315
  - type: LandAtCursor
  - type: DamageOtherOnHit
    damage:
      types:
        Piercing: 3

#TODO: I want the luxury pen to write a cool font like Merriweather in the future.

- type: entity
  name: luxury pen
  parent: Pen
  id: LuxuryPen
  description: A fancy and expensive pen that you only deserve to own if you're qualified to handle vast amounts of paperwork.
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Misc/Pens/luxury.rsi # imp addition
    state: icon # imp edit, luxury_pen -> icon
  - type: Item
    sprite: _Impstation/Objects/Misc/Pens/luxury.rsi # imp addition
    #heldPrefix: luxury_pen # imp edit
  # imp edit start
  - type: SignatureWriter
    colorList:
      black: "#2f4f4f"
      blue: "#284283"
      green: "#108473"
      red: "#ac3235"
  # imp edit end

- type: entity
  id: BaseAdvancedPen
  parent: PenEmbeddable
  abstract: true
  components:
  - type: Tag
    tags:
    - Write
    - WriteIgnoreStamps
    - Pen
  - type: MeleeWeapon
    wideAnimationRotation: -45
    damage:
      types:
        Piercing: 15
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Tool
    qualities:
    - Screwing
    useSound:
      collection: Screwdriver

- type: entity
  name: Cybersun pen
  parent: [BaseAdvancedPen, Tier2Contraband] #imp contraband
  id: CyberPen
  description: A high-tech pen straight from Cybersun's legal department, capable of refracting hard-light at impossible angles through its diamond tip in order to write. So powerful, it's even able to rewrite officially-stamped documents, should the need arise. # imp edit
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Misc/Pens/cybersun.rsi # imp addition
    state: icon # imp edit, overpriced_pen -> icon
  - type: Item
    sprite: _Impstation/Objects/Misc/Pens/cybersun.rsi # imp addition
    #heldPrefix: overpriced_pen # imp edit
  - type: StaticPrice
    price: 500
  # imp edit start
  - type: SignatureWriter # imp
    fontList:
      Noto Sans: Default
      Comic Neue: ComicNeue
      Hachi Maru Pop: HachiMaruPop
      Kode Mono: KodeMono
      Reenie Beanie: ReenieBeanie
      Tangerine: Tangerine
      UnifrakturMaguntia: UnifrakturMaguntia
      Wahroonga: Wahroonga
    colorList:
      black: "#2f4f4f"
      blue: "#284283"
      green: "#108473"
      red: "#ac3235"
      cyan: "#1a7694" #imp
      purple: "#6a3059" #imp
      magenta: "#a42f6b" #imp
      command blue: "#1b67a5"
      CentComm green: "#009100"
    # imp edit end

- type: entity
  name: CentComm pen
  parent: [BaseAdvancedPen, BaseCentcommContraband]
  id: PenCentcom
  description: A high-tech pen utilizing refracted hard-light precision to write. In an attempt to keep up with the "power" of the Cybersun bureaucracy, NT made a replica of the infamous Cybersun pen, in their own corporate style. # imp edit
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Misc/Pens/centcomm.rsi # imp addition
    state: icon # imp edit, pen_centcom -> icon
  - type: Item
    sprite: _Impstation/Objects/Misc/Pens/centcomm.rsi # imp addition
    #heldPrefix: pen_centcom # imp edit
  # imp edits #
  - type: SignatureWriter
    color: "#009100"
  # end imp edits #

