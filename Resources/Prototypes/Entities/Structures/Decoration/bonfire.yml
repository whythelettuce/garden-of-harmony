- type: entity
  abstract: true
  parent: BaseStructure
  id: BaseBonfire
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.4
        mask:
        - Impassable
        layer:
        - Opaque
        - BulletImpassable
  - type: Sprite
    noRot: true
    sprite: Structures/Decoration/bonfire.rsi
  #- type: PointLight #imp edit, handled with FireVisuals
  #  radius: 5
  #  energy: 3
  #  color: "#FFC90C"
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 50
        behaviors:
        - !type:PlaySoundBehavior
          sound:
            collection: WoodDestroy
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
        - !type:SpawnEntitiesBehavior #imp edit
          spawn:
            MaterialWoodPlank1:
              min: 6
              max: 10
  - type: AmbientSound
    volume: -5
    range: 5
    sound:
      path: /Audio/Ambience/Objects/fireplace.ogg
  #- type: AlwaysHot #imp edit, this is and IgnitionSource is handled with Flammable instead
  #- type: IgnitionSource
  #  temperature: 700
  #  ignited: true
  - type: RequireProjectileTarget
  # imp edit start
  - type: Appearance
  - type: EntityHeater
    requirePower: false
  - type: ItemPlacer
    maxEntities: 6 # big fire, many steaks
    whitelist:
      components:
      - Temperature
  - type: PlaceableSurface
  - type: Reactive
    groups:
      Flammable: [ Touch ]
      Extinguish: [ Touch ]
  - type: Flammable
    damage:
      types:
        Heat: 0 # adding any damage would make it break loudly into pieces, which feels weird
    flammableCollisionShape:
      !type:PhysShapeCircle
      radius: 0.25
    maximumFireStacks: 6
    fireSpread: true
    alwaysCombustible: true
    firestacksOnIgnite: 2
    firestackFade: 0.05 # gets hotter the longer it's on
    toggleAmbientSound: true
  - type: FireVisuals
    sprite: Structures/Decoration/bonfire.rsi
    normalState: burning
    maxLightRadius: 8
    maxLightEnergy: 5
  # imp edit end

- type: entity
  parent: BaseBonfire
  id: Bonfire
  name: bonfire
  description: What can be better than a late evening under the sky with guitar and friends?
  components:
  - type: Sprite
    layers:
    - state: bonfire #imp edit, bonfires look invisible without this
    #- state: burning #imp edit, handled by FireVisuals
  - type: Construction
    graph: Bonfire
    node: bonfire

- type: entity
  parent: BaseBonfire
  id: BonfireStake
  name: bonfire with stake
  description: A sinister bonfire with a stake for... ceremonial purposes. Best not to ask.
  components:
  - type: Sprite
    sprite: Structures/Decoration/bonfire_stake.rsi
    layers:
    - state: bonfire #imp edit, bonfires look invisible without this
    #- state: burning #imp edit, handled by FireVisuals
    offset: "0, 0.5"
  - type: Strap
    position: Stand
    buckleOffset: "0, 0.4"
    buckleDoafterTime: 5
  #- type: IgniteOnBuckle #imp edit, TODO: should be handled by Flammable from parent, but collision wonkiness prevents ignition on buckle, needs to be updated
  - type: Construction
    graph: Bonfire
    node: bonfireStake
  - type: FireVisuals #imp edit, needs to use its own sprites for FireVisuals since the sprite isn't 32x32
    sprite: Structures/Decoration/bonfire_stake.rsi
    normalState: burning

- type: entity
  parent: BaseBonfire
  id: LegionnaireBonfire
  name: legionnaire bonfire
  description: There, in the land of lava and ash, place to to cook marshmallow and potato.
  components:
  - type: Sprite
    layers:
    - state: bonfire #imp edit, bonfires look invisible without this
    - state: legionnaire_bonfire
  - type: PointLight
    color: "#FF5601"
