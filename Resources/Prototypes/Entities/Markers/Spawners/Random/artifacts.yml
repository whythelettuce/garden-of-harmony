- type: entityTable
  id: RandomArtifactTable
  table: !type:GroupSelector
    children:
    # imp edit start, use reticulated and natural artifact tables
    #- id: ComplexXenoArtifact
    #  weight: 2
    #- id: ComplexXenoArtifactItem
    # the below artifact tables match the pattern of the table above; structure artifacts are twice as likely to spawn as item artifacts
    - !type:NestedSelector
      tableId: RandomReticulatedArtifactTable
    - !type:NestedSelector
      tableId: RandomNaturalArtifactTable
    # imp edit end

- type: entity
  parent: MarkerBase
  id: RandomArtifactSpawner
  name: random artifact spawner
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Objects/Specific/Xenoarchaeology/xeno_artifacts.rsi
      state: ano01
  - type: EntityTableSpawner
    table: !type:NestedSelector
      tableId: RandomArtifactTable

- type: entity
  id: RandomArtifactSpawner20
  name: random artifact spawner [20]
  parent: RandomArtifactSpawner
  components:
  - type: EntityTableSpawner
    table: !type:NestedSelector
      tableId: RandomArtifactTable
      prob: 0.2
