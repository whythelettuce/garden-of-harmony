- type: entityTable
  id: RandomReticulatedArtifactTable
  table: !type:GroupSelector
    children:
    - id: ReticulatedXenoArtifactStructure
      weight: 2
    - id: ReticulatedXenoArtifactItem

- type: entityTable
  id: RandomNaturalArtifactTable
  table: !type:GroupSelector
    children:
    - id: NaturalXenoArtifactStructure
      weight: 2
    - id: NaturalXenoArtifactItem

- type: entity
  id: RandomReticulatedArtifactSpawner
  name: random reticulated artifact spawner
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Objects/Specific/Xenoarchaeology/xeno_artifacts.rsi
      state: ano01
  - type: EntityTableSpawner
    table: !type:NestedSelector
      tableId: RandomReticulatedArtifactTable

- type: entity
  id: RandomReticulatedArtifactSpawner20
  name: random reticulated artifact spawner [20]
  parent: RandomReticulatedArtifactSpawner
  components:
  - type: EntityTableSpawner
    table: !type:NestedSelector
      tableId: RandomReticulatedArtifactTable
      prob: 0.2


- type: entity
  id: RandomNaturalArtifactSpawner
  name: random natural artifact spawner
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Objects/Specific/Xenoarchaeology/xeno_artifacts.rsi
      state: ano01
  - type: EntityTableSpawner
    table: !type:NestedSelector
      tableId: RandomNaturalArtifactTable

- type: entity
  id: RandomNaturalArtifactSpawner20
  name: random natural artifact spawner [20]
  parent: RandomNaturalArtifactSpawner
  components:
  - type: EntityTableSpawner
    table: !type:NestedSelector
      tableId: RandomNaturalArtifactTable
      prob: 0.2
