- type: entity
  id: WindowDecapoid
  name: imperial window
  parent: [BaseDeltaPressureReinforcedGlass, WindowRCDResistant]
  description: gaze upon our domain, q'trp'j.
  components:
  - type: Sprite
    drawdepth: WallTops
    sprite: _Impstation/Structures/Walls/decawindow.rsi
  - type: Icon
    sprite: _Impstation/Structures/Walls/decawindow.rsi
  - type: Repairable
    fuelCost: 15
    doAfterDelay: 3
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: RGlass
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1000
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlassReinforced:
            min: 1
            max: 2
          PartRodMetal:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: IconSmooth
    key: walls
    base: deca
  - type: Appearance
  - type: DamageVisuals
    thresholds: [5, 10, 20]
    damageDivisor: 20
    trackAllDamage: true
    damageOverlay:
      sprite: Structures/Windows/cracks.rsi
  - type: StaticPrice
    price: 150
  - type: Construction
    graph: WindowDecapoid
    node: start
  - type: RadiationBlocker
    resistance: 10
