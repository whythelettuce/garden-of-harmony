- type: entity
  id: DecaCarpet
  parent: BaseStructure
  name: p'qk'jt
  description: non-slip matting designed to take foot traffic from shell-spikes. It seems to self-heal when punctured, somehow.
  components:
  - type: Sprite
    sprite: _Impstation/Structures/Furniture/Carpets/decapoid_carpet.rsi
    state: icon
    drawdepth: FloorTiles
  - type: Icon
    sprite: _Impstation/Structures/Furniture/Carpets/decapoid_carpet.rsi
    state: item
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 100
        behaviors: #excess damage (nuke?). avoid computational cost of spawning entities.
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
      - trigger:
          !type:DamageTrigger
          damage: 10
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
          - !type:SpawnEntitiesBehavior
            spawn:
              FloorDecaCarpetItem:
                min: 1
                max: 1
  - type: Physics
    canCollide: false
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 5
        layer:
        - DoorPassable
  - type: TrayScanReveal
