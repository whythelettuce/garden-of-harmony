- type: entity
  parent: BaseItem
  id: BaseMagazineBoxDart
  abstract: true
  name: dart box
  description: A box made for 4 muldoon darts.
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Weapons/Guns/Ammunition/Boxes/dart.rsi
  - type: Item
    size: Small
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
      - Dart
    capacity: 4
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: false
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Appearance

- type: entity
  parent: BaseMagazineBoxDart
  id: BoxTranqDart
  name: dart box (tranquilizer)
  description: A box made for 4 muldoon darts, labeled as tranquilizer darts.
  components:
  - type: BallisticAmmoProvider
    proto: TranqDart
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: false
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: tranq

- type: entity
  parent: BaseMagazineBoxDart
  id: BoxIrwizineDart
  name: dart box (irwizine)
  description: A box made for 4 muldoon darts, labeled as irwizine darts.
  components:
  - type: BallisticAmmoProvider
    proto: IrwizineDart
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: false
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: irwizine

- type: entity
  parent: [ BaseMagazineBoxDart, Tier3Contraband ]
  id: BoxShockDart
  name: dart box (shock)
  description: A box made for 4 muldoon darts, labeled as shock darts.
  components:
  - type: BallisticAmmoProvider
    proto: ShockDart
  - type: MagazineVisuals
    magState: mag
    steps: 5
