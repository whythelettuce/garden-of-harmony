- type: entity
  parent: [DoorRemoteDefault, BaseCommandContraband]
  id: DoorRemoteHoP
  name: head of personnel door remote
  components:
  - type: Sprite
    layers:
    - state: door_remotebase
    - state: door_remotelightscolour
      color: "#e6e600"
    - state: door_remotescreencolour
      color: "#9f9f00"
  - type: Access
    tags:
    - Command
    - ChiefEngineer
    - ChiefMedicalOfficer
    - Cryogenics
    - HeadOfPersonnel
    - HeadOfSecurity
    - Quartermaster
    - ResearchDirector
    - HospitalityDirector

- type: entity
  parent: [DoorRemoteCustom]
  id: DoorRemoteDecapoidCore
  name: core door remote
  suffix: DO NOT MAP
  description: A gadget which can open and bolt doors remotely. This advanced variant does not have built-in access, instead inheriting the ID access of the user.
  components:
  - type: DoorRemote
    includeUserAccess: true
    ignoreViewCast: true
