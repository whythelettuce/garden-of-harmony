- type: entity
  parent: BoxCardboard
  name: zookeeper cube box
  id: ZookeeperCubeBox
  description: A selection of dehydrated animal cubes to start off a zoo. Just add some water!
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Misc/zookeepercubebox.rsi
    state: box
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:NestedSelector
        rolls: !type:RangeNumberSelector
          range: 9, 9
        tableId: RandomZookeeperCubeTable

- type: entityTable
  id: RandomZookeeperCubeTable
  table: !type:GroupSelector
