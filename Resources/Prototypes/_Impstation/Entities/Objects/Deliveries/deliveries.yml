  abstract: true
  id: DepartmentalLetters
  components:
  - type: Delivery
    departmentTables: {}
      # FIG 1. command is not a primary department, so this is a "fallback" for command members
      # who do not have mail for their job or primary department defined
      # Command: !type:NestedSelector
      #   tableId: LotteryCashEntityTable
      #
      # FIG 2. if you want "generic" mail to still roll for the engineering department,
      # you'll have to include it in the selector and decide the weights yourself
      # Engineering: !type:GroupSelector
      #   children:
      #   - !type:NestedSelector
      #     tableId: LotteryCanistersEntityTable
      #     weight: 0.3
      #   - !type:NestedSelector
      #     tableId: LetterDeliveryRewards
      #     weight: 0.7
      #
      # FIG 3. science just gets food, including the research director
      # Science: !type:NestedSelector
      #   tableId: MealFoodTable
    jobTables: {}
      # FIG 4. chief engineers will only get CE mail, they won't get engineering mail.
      # per-job tables are always the highest priority loot table
      # ChiefEngineer: !type:NestedSelector
      #   tableId: LotteryPlushiesEntityTable

