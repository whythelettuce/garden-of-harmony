# hi there this is how departmental mail works. when a mail delivery is picking its loot table...
#
# 1. it will use the per-job mail table first
#
# 2. if there is no per-job mail table, then it will use the primary department
#   - (most departments are primary, command isn't. so the research director's primary department is science)
#
# 3. if there is no primary department, it will use the first applicable department
#   - (so, if there's no science table, then RD will fallback to command)
#
# 4. if there is no applicable department table, it will just use the basic mail table
#
# note that you'll have to decide for yourself how much the base mail table weighs in here by
# including the LetterDeliveryRewards or PackageDeliveryRewards tables in the selector somewhere.
# if you want, you can leave it out and replace the mail loot table entirely if you want a job/department
# to not get the "generic" mail
#
# have fun you guys
# - portfiend (march 11 2026)

