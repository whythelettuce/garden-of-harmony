- type: entity
  name: lethal poison auto-injector
  parent: [ChemicalMedipen, Tier3Contraband]
  description: A single dose of a lethal toxin mix, induces gradual organ failure and esophagus inflammation which eliminates a subject within one to two minutes of injection. Small print on it says "Non-Recyclable. Please return to Gorlex Customer Satisfaction for reuse and rebate."
  id: PoisonAutoInjector
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Specific/Medical/medipen.rsi
    layers:
    - state: poisonpen
      map: ["enum.SolutionContainerLayers.Fill"]
  - type: Item
    sprite: Objects/Specific/Medical/medipen.rsi
    inhandVisuals:
      left:
      - state: base-needle-inhand-left
      - state: base-colorA-inhand-left
        color: "#232226"
      - state: base-colorB-inhand-left
        color: "#3e3d3f"
      right:
      - state: base-needle-inhand-right
      - state: base-colorA-inhand-right
        color: "#232226"
      - state: base-colorB-inhand-right
        color: "#3e3d3f"
    size: Tiny
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 30
        reagents:
        - ReagentId: Bungotoxin
          Quantity: 20.7
        - ReagentId: Toxin
          Quantity: 1.5
        - ReagentId: Paprika
          Quantity: 4.8
        - ReagentId: UncookedAnimalProteins
          Quantity: 2
        - ReagentId: Impedrezene
          Quantity: 1
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: poisonpen_empty

- type: entity
  name: romerol auto-injector
  parent: [ ChemicalMedipen, Tier3Contraband ]
  id: RomerolAutoInjector
  description: A rapid and unsafe way to stabilize patients in critical condition by turning them into a zombie.
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Specific/Medical/zombiepen.rsi
    layers:
    - state: icon
      map: [ "enum.SolutionContainerLayers.Fill" ]
  - type: Item
    sprite: Objects/Specific/Medical/medipen.rsi
    inhandVisuals:
      left:
      - state: base-needle-inhand-left
      - state: base-colorA-inhand-left
        color: "#5B0010"
      - state: base-colorB-inhand-left
        color: "#820A16"
      right:
      - state: base-needle-inhand-right
      - state: base-colorA-inhand-right
        color: "#5B0010"
      - state: base-colorB-inhand-right
        color: "#820A16"
    size: Tiny
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 15
        reagents:
        - ReagentId: Romerol
          Quantity: 15
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: icon_empty

- type: entity
  name: romerol micro-injector
  parent: RomerolAutoInjector
  id: RomerolMicroInjector
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Specific/Medical/zombiepen_micro.rsi
    layers:
    - state: icon
      map: [ "enum.SolutionContainerLayers.Fill" ]
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 5
        reagents:
        - ReagentId: Romerol
          Quantity: 5

- type: entity
  parent: ChemicalMedipen
  id: EmergencyMedipenDiscountDan
  name: Doctor Dan's all-in-one QuikFix pen
  description: Contains everything you may or may not need in an emergency, and more!
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Specific/Medical/medipen.rsi
    layers:
    - state: danmedipen
      map: ["enum.SolutionContainerLayers.Fill"]
  - type: Item
    sprite: Objects/Specific/Medical/medipen.rsi
    inhandVisuals:
      left:
      - state: base-needle-inhand-left
      - state: base-colorA-inhand-left
        color: "#dfd2b9"
      - state: base-colorB-inhand-left
        color: "#ef9a35"
      right:
      - state: base-needle-inhand-right
      - state: base-colorA-inhand-right
        color: "#dfd2b9"
      - state: base-colorB-inhand-right
        color: "#ef9a35"
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: danmedipen_empty
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 20
        reagents:
        - ReagentId: Bicaridine
          Quantity: 1.5
        - ReagentId: Kelotane
          Quantity: 1.5
        - ReagentId: Dylovene
          Quantity: 1.5
        - ReagentId: Dexalin
          Quantity: 1.5
        - ReagentId: PotassiumIodide
          Quantity: 1.5
        - ReagentId: Epinephrine
          Quantity: 4
        - ReagentId: TableSalt #basically the same as saline probably
          Quantity: 1.5
        - ReagentId: Honey #yummy!
          Quantity: 1
        - ReagentId: PinkFoodColoring #pink = healthy
          Quantity: 6
  - type: Tag # goob edit
    tags:
      - Trash
      - EmergencyMedipen
