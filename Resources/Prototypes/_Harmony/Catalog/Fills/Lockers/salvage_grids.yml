## Laser Carbine - less laser than secs, chance for practice laser
- type: entityTable
  id: GunSafeSalvageTableLaserCarbine
  table: !type:GroupSelector
    children:
    - id: WeaponLaserCarbine
    - id: WeaponLaserCarbinePractice

## Kammerer - less weapons and ammo than secs or the cargo crate. also beanbag ammo.
- type: entityTable
  id: GunSafeSalvageTableKammerer
  table: !type:AllSelector
    children:
    - id: WeaponShotgunKammerer
    - id: MagazineShotgunBeanbag
      prob: 0.8 # Chance for no Ammo

## Drozd - less weapons and ammo than secs or the cargo crate.
- type: entityTable
  id: GunSafeSalvageTableDrozd
  table: !type:AllSelector
    children:
    - id: WeaponSubMachineGunDrozd
    - id: MagazineBoxPistol # Has more ammo than an SMG magazine, but the Drozd only accepts magazines. Requires you to eject, manually reload, and reinsert a magazine if you want to actually reload the drozd. Doable against Mobs, death sentence in a fight againts players. Hopefully, thats enough to dissuade validhunting...
      prob: 0.8 # Chance for no Ammo

# Safe Spawn Fill
- type: entityTable
  id: GunSafeSalvageTableLoot
  table: !type:GroupSelector
    children:
    - !type:NoneSelector
      weight: 30
    # Common
    - !type:GroupSelector
      weight: 30
      children:
      - !type:NestedSelector
        tableId: GunSafeSalvageTableCrushers
      - !type:NestedSelector
        tableId: GunSafeSalvageTablePKA
      - !type:NestedSelector
        tableId: GunSafeSalvageTableFlintlock
      - !type:NestedSelector
        tableId: GunSafeSalvageTableImprovisedShotgun
    # Uncommon
    - !type:GroupSelector
      weight: 25
      children:
      - !type:NestedSelector
        tableId: GunSafeSalvageTableDoubleBarrelShotgun
      - !type:NestedSelector
        tableId: GunSafeSalvageTableMosin
      - !type:NestedSelector
        tableId: GunSafeSalvageTableBlunderbuss
    # Rare
    - !type:GroupSelector
      weight: 15
      children:
      - !type:NestedSelector
        tableId: GunSafeSalvageTableRSC
      - !type:NestedSelector
        tableId: GunSafeSalvageTableLaserCarbine
      - !type:NestedSelector
        tableId: GunSafeSalvageTableKammerer
        weight: 0.1
      - !type:NestedSelector
        tableId: GunSafeSalvageTableDrozd
        weight: 0.1

# Armory Lockers
# DO NOT MAP THESE, USE THE RANDOM SAFE SPAWNER
# There is purposefully no Retro Laser or Pirate Revolver safes.

## Salvage-mapped Gun Safe. Sec Locked with less and weaker guns.
- type: entity
  parent: [GunSafeBaseSecure, BaseSecurityContraband]
  id: GunSafeSalvage
  suffix: Salvage, Filled, Harmony
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: GunSafeSalvageTableLoot
