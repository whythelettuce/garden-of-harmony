- type: entity
  parent: CardBoxBase
  id: CardBoxTarot
  name: tarot deck box
  suffix: Harmony
  description: The cards, the cards, the cards will tell... The past, the present, and the future as well...
  components:
  - type: Item
    size: Small
  - type: Sprite
    sprite: _EstacaoPirata/Objects/Misc/cards.rsi
    layers:
    - state: tarot_box
    - state: tarot_box_open
      map: [ "openLayer" ]
      visible: false
  - type: OpenTriggeredStorageFill
    contents:
    - id: TarotDeck
      amount: 1

- type: entity
  parent: CardDeckBase
  id: TarotDeck
  name: deck of tarot cards
  categories: [ HideSpawnMenu ] 
  components:
  - type: Sprite
    sprite: _EstacaoPirata/Objects/Misc/cards.rsi
    state: deck_tarot_full
  - type: CardStack
    initialContent:
    # All of them
    - CardSc0TheFoolTarot
    - CardSc1TheMagicianTarot
    - CardSc2TheHighPriestessTarot
    - CardSc3TheEmpressTarot
    - CardSc4TheEmperorTarot
    - CardSc5TheHierophantTarot
    - CardSc6TheLoversTarot
    - CardSc7TheChariotTarot
    - CardSc8StrengthTarot
    - CardSc9TheHermitTarot
    - CardSc10TheWheelOfFortuneTarot
    - CardSc11JusticeTarot
    - CardSc12TheHangedManTarot
    - CardSc13DeathTarot
    - CardSc14TemperanceTarot
    - CardSc15TheDevilTarot
    - CardSc16TheTowerTarot
    - CardSc17TheStarTarot
    - CardSc18TheMoonTarot
    - CardSc19TheSunTarot
    - CardSc20JudgementTarot
    - CardSc21TheWorldTarot

- type: entity
  parent: BaseItem
  id: TarotCardBase
  name: card
  categories: [ HideSpawnMenu ]
  components:
  - type: EmitSoundOnLand
    sound:
      collection: cardShove
  - type: Sprite
    sprite: _EstacaoPirata/Objects/Misc/cards.rsi
    state: singlecard_down_tarot
  - type: Rotatable
  - type: Item
    size: Small
  - type: UseDelay
    delay: 0.5
  - type: Card
    backSprite:
    - sprite: _EstacaoPirata/Objects/Misc/cards.rsi
      state: singlecard_down_tarot
    flipped: true
  - type: StripMenuHidden

